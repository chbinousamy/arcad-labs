<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGO BRICK BREAKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

:root {
  --floor: #e8d5a3;
  --bg: #1a1a2e;
  --panel: #16213e;
  --accent: #f5a623;
  --white: #ffffff;
  --shadow: rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  user-select: none;
}

/* Studs pattern background */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.03) 2px, transparent 2px);
  background-size: 32px 32px;
  pointer-events:none;
}

#app {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  padding: 20px;
}

/* ── Side panel ── */
#panel {
  width: 160px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-block {
  background: #0f3460;
  border-radius: 12px;
  padding: 16px;
  border-bottom: 4px solid #0a2440;
  position: relative;
}

.panel-block::before {
  content:'';
  position:absolute;
  top: -6px; left: 50%; transform:translateX(-50%);
  width: 24px; height: 12px;
  background: #0f3460;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  border-top: 3px solid rgba(255,255,255,0.1);
}

.panel-label {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}

.panel-value {
  font-size: 32px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 2px 8px rgba(245,166,35,0.4);
}

#lives-display { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.life-ball {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
  box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.3);
  transition: transform 0.2s, opacity 0.3s;
}

.life-ball.lost { opacity: 0.15; transform: scale(0.8); }

#btn-start {
  background: linear-gradient(180deg, #f5a623 0%, #e67e22 100%);
  border: none;
  border-bottom: 5px solid #b7600f;
  border-radius: 10px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 1px;
  padding: 12px 8px;
  cursor: pointer;
  width: 100%;
  text-transform: uppercase;
  transition: transform 0.1s, border-bottom-width 0.1s;
  position: relative;
  overflow: hidden;
}

#btn-start::before {
  content:'';
  position:absolute;
  top: 6px; left: 50%; transform:translateX(-50%);
  width: 28px; height: 10px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
}

#btn-start:hover { filter: brightness(1.1); }
#btn-start:active { transform: translateY(3px); border-bottom-width: 2px; }

/* ── Canvas wrapper ── */
#game-wrap {
  position: relative;
}

canvas {
  display: block;
  border-radius: 8px;
  box-shadow:
    0 0 0 3px #0f3460,
    0 0 0 6px #0a2440,
    0 20px 60px rgba(0,0,0,0.6);
}

/* ── Overlay ── */
#overlay {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(15, 52, 96, 0.92);
  backdrop-filter: blur(4px);
  gap: 20px;
  transition: opacity 0.3s;
}

#overlay.hidden { opacity: 0; pointer-events: none; }

.overlay-logo {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

.overlay-title {
  font-size: 42px;
  font-weight: 900;
  color: var(--accent);
  text-shadow: 0 4px 16px rgba(245,166,35,0.5), 0 0 40px rgba(245,166,35,0.2);
  text-align: center;
  line-height: 1.1;
}

.overlay-sub {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  text-align: center;
  line-height: 1.8;
}

.overlay-score-big {
  font-size: 56px;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 30px rgba(255,255,255,0.3);
}

/* ── Level badge ── */
#level-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: #e74c3c;
  border-bottom: 3px solid #a93226;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;
  color: white;
  text-transform: uppercase;
}

/* ── Combo popup ── */
#combo {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 36px;
  font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(245,166,35,0.8);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

/* Particles */
.particle {
  position: absolute;
  border-radius: 2px;
  pointer-events: none;
  animation: particle-fly 0.7s ease-out forwards;
}

@keyframes particle-fly {
  0%   { opacity: 1; transform: translate(0,0) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); }
}
</style>
</head>

  <!-- Side panel -->

    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════
const SFX = (() => {
  let ac = null;
  function init() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
  }
  function tone(freq, type, dur, vol=0.3, freqEnd=null) {
    if (!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    if (freqEnd) o.frequency.linearRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  }
  function noise(dur, vol=0.3, lp=1000) {
    if (!ac) return;
    const sr = ac.sampleRate;
    const buf = ac.createBuffer(1, sr*dur, sr);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
    const g = ac.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(); src.stop(ac.currentTime+dur);
  }
  return {
    init,
    paddle:  () => tone(300, 'sine',    0.08, 0.2),
    wall:    () => tone(200, 'sine',    0.06, 0.15),
    hit:     (pts) => {
      const f = 300 + pts * 8;
      tone(f, 'square', 0.06, 0.2);
      tone(f*1.5, 'sine', 0.1, 0.1);
    },
    special: () => { tone(800,'sine',0.05,0.25); tone(1200,'sine',0.1,0.2); },
    die:     () => { tone(220,'sawtooth',0.3,0.3,60); noise(0.3,0.3,400); },
    win:     () => {
      [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',0.2,0.4),i*120));
    },
    over:    () => {
      [400,300,200,100].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.25,0.4),i*180));
    },
    launch:  () => tone(600,'sine',0.15,0.25,900),
  };
})();

// ══════════════════════════════════════════════
// CANVAS & CONTEXT
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ══════════════════════════════════════════════
// LEGO COLORS
// ══════════════════════════════════════════════
const LEGO_COLORS = [
  { top:'#e3000b', side:'#a50008', stud:'#c90007' }, // rouge
  { top:'#f5c518', side:'#c49b00', stud:'#d9ac00' }, // jaune
  { top:'#006cb7', side:'#004f88', stud:'#005fa0' }, // bleu
  { top:'#00a550', side:'#007035', stud:'#009044' }, // vert
  { top:'#f58220', side:'#c05c00', stud:'#d96e00' }, // orange
  { top:'#9b59b6', side:'#7d3c98', stud:'#8e44ad' }, // violet
  { top:'#1abc9c', side:'#148f77', stud:'#17a589' }, // turquoise
  { top:'#e74c3c', side:'#c0392b', stud:'#d44236' }, // rouge foncé
  { top:'#3498db', side:'#2176ae', stud:'#2980b9' }, // bleu clair
  { top:'#2ecc71', side:'#27ae60', stud:'#25b35a' }, // vert clair
  { top:'#ffffff', side:'#bdc3c7', stud:'#d5d8dc' }, // blanc
  { top:'#34495e', side:'#2c3e50', stud:'#2e4057' }, // gris foncé
];

// ══════════════════════════════════════════════
// GAME CONFIG
// ══════════════════════════════════════════════
const BRICK_COLS = 10;
const BRICK_ROWS = 5;
const BRICK_W    = 42;
const BRICK_H    = 22;
const BRICK_GAP  = 3;
const BRICK_OFF_X = (W - BRICK_COLS * (BRICK_W + BRICK_GAP) + BRICK_GAP) / 2;
const BRICK_OFF_Y = 52;

const PADDLE_H   = 16;
const PADDLE_Y   = H - 50;
const BALL_R     = 7;
const MAX_LIVES  = 3;

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let state   = 'idle'; // idle | playing | paused | dead | win | over
let score   = 0, best = 0, lives = MAX_LIVES, level = 1;
let combo   = 0, comboTimer = 0;
let bricks  = [];
let paddle  = { x: W/2, w: 80, speed: 5 };
let ball    = { x: W/2, y: PADDLE_Y - BALL_R - 1, vx: 0, vy: 0, onPad: true };
let particles = [];
let keys    = {};
let lastTime = 0;
let raf     = null;

// ══════════════════════════════════════════════
// HUD refs
// ══════════════════════════════════════════════
const scoreEl  = document.getElementById('score-val');
const bestEl   = document.getElementById('best-val');
const livesEl  = document.getElementById('lives-display');
const lvlEl    = document.getElementById('lvl-num');
const overlay  = document.getElementById('overlay');
const ovTitle  = document.getElementById('ov-title');
const ovSub    = document.getElementById('ov-sub');
const ovScore  = document.getElementById('ov-score');
const comboEl  = document.getElementById('combo');
const btnStart = document.getElementById('btn-start');

// ══════════════════════════════════════════════
// LEGO BRICK DRAW
// ══════════════════════════════════════════════
function drawLegoBrick(x, y, w, h, col, alpha=1, hp=1, maxHp=1) {
  ctx.save();
  ctx.globalAlpha = alpha;

  const studs = Math.round(w / (BRICK_W / 4));
  const sR    = 4.5;
  const sH    = 3; // stud height (3D illusion)
  const sideH = 5; // side thickness at bottom
  const crack  = maxHp > 1 && hp < maxHp;

  // Side face (bottom)
  ctx.fillStyle = col.side;
  ctx.beginPath();
  ctx.moveTo(x, y + h - sideH);
  ctx.lineTo(x + w, y + h - sideH);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
  ctx.fill();

  // Right face (3D side)
  const rw = 4;
  ctx.fillStyle = col.side;
  ctx.beginPath();
  ctx.moveTo(x + w, y + 3);
  ctx.lineTo(x + w + rw, y);
  ctx.lineTo(x + w + rw, y + h - 2);
  ctx.lineTo(x + w, y + h - sideH);
  ctx.closePath();
  ctx.fill();

  // Top face
  const grad = ctx.createLinearGradient(x, y, x, y+h-sideH);
  grad.addColorStop(0, lighten(col.top, 20));
  grad.addColorStop(0.4, col.top);
  grad.addColorStop(1, darken(col.top, 10));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h - sideH, [3, 3, 0, 0]);
  ctx.fill();

  // Highlight top-left edge
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x+3, y+h-sideH-1);
  ctx.lineTo(x+3, y+4);
  ctx.lineTo(x+w-3, y+4);
  ctx.stroke();

  // Shadow bottom edge
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x+2, y+h-sideH-1);
  ctx.lineTo(x+w-2, y+h-sideH-1);
  ctx.stroke();

  // Studs
  const studSpacing = w / studs;
  for (let s = 0; s < studs; s++) {
    const sx = x + studSpacing * (s + 0.5);
    const sy = y + 4;

    // Stud shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(sx + 1, sy + sH + 1, sR, sR * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stud cylinder side
    const studGrad = ctx.createLinearGradient(sx - sR, sy, sx + sR, sy);
    studGrad.addColorStop(0, darken(col.stud, 15));
    studGrad.addColorStop(0.4, col.stud);
    studGrad.addColorStop(1, darken(col.stud, 25));
    ctx.fillStyle = studGrad;
    ctx.beginPath();
    ctx.ellipse(sx, sy + sH, sR, sR * 0.35, 0, 0, Math.PI);
    ctx.ellipse(sx, sy,       sR, sR * 0.35, 0, Math.PI, 0);
    ctx.closePath();
    ctx.fill();

    // Stud top ellipse
    const topGrad = ctx.createRadialGradient(sx - 1.5, sy - 1, 0, sx, sy, sR);
    topGrad.addColorStop(0, lighten(col.stud, 30));
    topGrad.addColorStop(1, darken(col.stud, 5));
    ctx.fillStyle = topGrad;
    ctx.beginPath();
    ctx.ellipse(sx, sy, sR, sR * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Crack overlay for damaged bricks
  if (crack) {
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    const cx2 = x + w * 0.4, cy2 = y + 6;
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(cx2 - 5, cy2 + 8);
    ctx.lineTo(cx2 + 2, cy2 + 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx2 + 8, cy2 + 2);
    ctx.lineTo(cx2 + 12, cy2 + 10);
    ctx.stroke();
  }

  ctx.restore();
}

function parseColor(c) {
  // handles #rrggbb and rgb(r,g,b)
  if (c && c[0] === '#') {
    return [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
  }
  if (c) {
    const m = c.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
    if (m) return [+m[1], +m[2], +m[3]];
  }
  return [128,128,128]; // fallback
}
function lighten(col, pct) { return shiftColor(col,  pct); }
function darken (col, pct) { return shiftColor(col, -pct); }
function shiftColor(col, pct) {
  const [r,g,b] = parseColor(col);
  const f = pct / 100;
  const nr = Math.min(255, Math.max(0, Math.round(r + 255*f)));
  const ng = Math.min(255, Math.max(0, Math.round(g + 255*f)));
  const nb = Math.min(255, Math.max(0, Math.round(b + 255*f)));
  return `rgb(${nr},${ng},${nb})`;
}

// ══════════════════════════════════════════════
// LEGO PADDLE
// ══════════════════════════════════════════════
function drawPaddle() {
  const x = paddle.x - paddle.w / 2;
  const y = PADDLE_Y;
  const w = paddle.w;
  const h = PADDLE_H;
  const col = { top:'#f5c518', side:'#c49b00', stud:'#d9ac00' };
  drawLegoBrick(x, y, w, h, col);
}

// ══════════════════════════════════════════════
// BALL (LEGO ball = round piece)
// ══════════════════════════════════════════════
function drawBall() {
  const x = ball.x, y = ball.y, r = BALL_R;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x+2, y+3, r, r*0.5, 0, 0, Math.PI*2);
  ctx.fill();
  // Sphere
  const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.4, '#e8e8e8');
  g.addColorStop(1, '#bdc3c7');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
  // Specular
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.ellipse(x-2, y-2, r*0.3, r*0.2, -0.5, 0, Math.PI*2);
  ctx.fill();
  // LEGO logo dot
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI*2);
  ctx.fill();
}

// ══════════════════════════════════════════════
// BACKGROUND (LEGO baseplate)
// ══════════════════════════════════════════════
function drawBackground() {
  // Dark base
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 16) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 16) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Baseplate studs hint in play area
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let x = 8; x < W; x += 32) {
    for (let y = BRICK_OFF_Y - 20; y < H - 80; y += 32) {
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// ══════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════
function spawnParticles(x, y, col, count=14) {
  for (let i = 0; i < count; i++) {
    const angle  = (Math.random() * Math.PI * 2);
    const speed  = 2 + Math.random() * 5;
    const size   = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      color: col,
      w: size, h: size * 0.6,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.3,
      isStud: Math.random() > 0.5
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.18; // gravity
    p.rot += p.rotV;
    p.life -= p.decay;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.isStud) {
      // tiny stud shape
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.fillStyle = lighten(p.color, 15);
      ctx.beginPath();
      ctx.ellipse(0, -p.h/2, p.w*0.35, p.h*0.3, 0, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    }
    ctx.restore();
  });
}

// ══════════════════════════════════════════════
// BRICKS INIT
// ══════════════════════════════════════════════
function initBricks() {
  bricks = [];
  const rowHp = [1,1,2,2,3]; // plus solides en haut

  // Trier les couleurs : niveau = plus de variété
  const palette = [...LEGO_COLORS].sort(() => Math.random()-0.5);

  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const hp = rowHp[r] + Math.floor(level / 3);
      const colIdx = (r + Math.floor(level * 1.3)) % palette.length;
      bricks.push({
        x: BRICK_OFF_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_OFF_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        col: palette[colIdx],
        hp, maxHp: hp,
        alive: true,
        shake: 0,
        pts: (BRICK_ROWS - r) * 10 + (hp - 1) * 20,
        // bonus type : 1/8 chance
        bonus: Math.random() < 0.12 ? ['wide','multi','fast'][Math.floor(Math.random()*3)] : null
      });
    }
  }
}

// ══════════════════════════════════════════════
// BALL LAUNCH
// ══════════════════════════════════════════════
function launchBall() {
  if (!ball.onPad) return;
  const speed = 5 + level * 0.3;
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.6;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
  ball.onPad = false;
  SFX.launch();
}

// ══════════════════════════════════════════════
// EXTRA BALLS (multi bonus)
// ══════════════════════════════════════════════
let extraBalls = [];

// ══════════════════════════════════════════════
// BONUS ITEMS
// ══════════════════════════════════════════════
let bonusItems = [];

function spawnBonus(x, y, type) {
  bonusItems.push({ x, y, vy: 2, type, life: 1 });
}

const BONUS_COLORS = { wide:'#f5c518', multi:'#1abc9c', fast:'#e74c3c' };
const BONUS_LABELS = { wide:'↔ LARGE', multi:'✦ MULTI', fast:'⚡ SPEED' };

function drawBonusItems() {
  bonusItems.forEach(b => {
    const col  = BONUS_COLORS[b.type];
    const lbl  = BONUS_LABELS[b.type];
    const bw = 60, bh = 18;
    drawLegoBrick(b.x - bw/2, b.y - bh/2, bw, bh,
      { top: col, side: darken(col, 20), stud: darken(col, 10) });
    ctx.fillStyle = 'white';
    ctx.font = 'bold 8px Nunito';
    ctx.textAlign = 'center';
    ctx.fillText(lbl, b.x, b.y + 3);
  });
}

function updateBonusItems() {
  bonusItems = bonusItems.filter(b => {
    b.y += b.vy;
    if (b.y > H) return false;
    // collision with paddle
    const px = paddle.x - paddle.w/2, py = PADDLE_Y;
    if (b.x > px && b.x < px + paddle.w && b.y + 9 > py && b.y - 9 < py + PADDLE_H) {
      applyBonus(b.type);
      SFX.special();
      return false;
    }
    return true;
  });
}

let bonusTimer = 0;
function applyBonus(type) {
  if (type === 'wide') {
    paddle.w = Math.min(140, paddle.w + 30);
    bonusTimer = 300;
  } else if (type === 'multi') {
    // spawn 2 extra balls
    const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    for (let i = 0; i < 2; i++) {
      const a = Math.atan2(ball.vy, ball.vx) + (i===0?0.4:-0.4);
      extraBalls.push({ x: ball.x, y: ball.y, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed });
    }
  } else if (type === 'fast') {
    // slow down briefly
    ball.vx *= 0.7; ball.vy *= 0.7;
  }
}

// ══════════════════════════════════════════════
// SCORE POPUPS
// ══════════════════════════════════════════════
let popups = [];
function spawnPopup(x, y, text, col) {
  popups.push({ x, y, text, col, life: 1, vy: -1.5 });
}

function updatePopups() {
  popups = popups.filter(p => {
    p.y += p.vy; p.life -= 0.025; return p.life > 0;
  });
}

function drawPopups() {
  popups.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.font = `bold ${12 + Math.round((1-p.life)*4)}px Nunito`;
    ctx.fillStyle = p.col;
    ctx.textAlign = 'center';
    ctx.shadowColor = p.col;
    ctx.shadowBlur = 8;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  });
}

// ══════════════════════════════════════════════
// BALL PHYSICS
// ══════════════════════════════════════════════
function moveBall(b, isExtra=false) {
  if (ball.onPad && !isExtra) return;

  b.x += b.vx;
  b.y += b.vy;

  // Walls
  if (b.x - BALL_R < 0)  { b.x = BALL_R;   b.vx = Math.abs(b.vx);  SFX.wall(); }
  if (b.x + BALL_R > W)  { b.x = W-BALL_R; b.vx = -Math.abs(b.vx); SFX.wall(); }
  if (b.y - BALL_R < 0)  { b.y = BALL_R;   b.vy = Math.abs(b.vy);  SFX.wall(); }

  // Paddle
  const px = paddle.x - paddle.w/2;
  if (b.vy > 0 &&
      b.y + BALL_R >= PADDLE_Y &&
      b.y - BALL_R <= PADDLE_Y + PADDLE_H &&
      b.x > px && b.x < px + paddle.w) {
    b.y = PADDLE_Y - BALL_R;
    // angle based on hit position
    const rel  = (b.x - paddle.x) / (paddle.w / 2);
    const spd  = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    const ang  = rel * (Math.PI * 0.35) - Math.PI/2;
    b.vx = Math.cos(ang) * spd;
    b.vy = Math.sin(ang) * spd;
    SFX.paddle();
    return;
  }

  // Fall off
  if (!isExtra && b.y > H + 20) {
    ballLost();
    return;
  }
  if (isExtra) return;

  // Brick collision
  for (let i = 0; i < bricks.length; i++) {
    const br = bricks[i];
    if (!br.alive) continue;
    if (b.x + BALL_R < br.x || b.x - BALL_R > br.x + br.w + 4 ||
        b.y + BALL_R < br.y || b.y - BALL_R > br.y + br.h) continue;

    // Which side?
    const fromLeft   = b.x < br.x;
    const fromRight  = b.x > br.x + br.w + 4;
    const fromTop    = b.y < br.y + br.h/2;

    if (fromLeft || fromRight) b.vx *= -1;
    else                       b.vy *= -1;

    br.hp--;
    br.shake = 6;
    combo++;
    comboTimer = 90;
    const pts = br.pts * (combo > 2 ? combo : 1);
    score += pts;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }

    SFX.hit(br.pts);
    spawnParticles(br.x + br.w/2, br.y + br.h/2, br.col.top, 14);
    spawnPopup(br.x + br.w/2, br.y, combo > 2 ? `x${combo} +${pts}` : `+${pts}`,
               combo > 2 ? '#f5a623' : 'white');

    if (br.hp <= 0) {
      br.alive = false;
      if (br.bonus) spawnBonus(br.x + br.w/2, br.y, br.bonus);
    }
    break;
  }
}

function ballLost() {
  lives--;
  updateLivesHUD();
  SFX.die();
  combo = 0;
  extraBalls = [];
  if (lives <= 0) {
    state = 'over';
    showOverlay('over');
    SFX.over();
    return;
  }
  // Reset ball
  ball.x = paddle.x;
  ball.y = PADDLE_Y - BALL_R - 1;
  ball.vx = 0; ball.vy = 0;
  ball.onPad = true;
}

// ══════════════════════════════════════════════
// LEVEL CLEAR CHECK
// ══════════════════════════════════════════════
function checkWin() {
  if (bricks.every(b => !b.alive)) {
    state = 'win';
    SFX.win();
    setTimeout(() => {
      level++;
      lvlEl.textContent = level;
      initBricks();
      ball.x = paddle.x;
      ball.y = PADDLE_Y - BALL_R - 1;
      ball.vx = 0; ball.vy = 0;
      ball.onPad = true;
      extraBalls = [];
      bonusItems = [];
      state = 'playing';
    }, 1200);
  }
}

// ══════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════
function update() {
  if (state !== 'playing') return;

  // Paddle
  const minX = paddle.w/2 + 2;
  const maxX = W - paddle.w/2 - 2;
  if (keys['ArrowLeft']  || keys['a']) paddle.x = Math.max(minX, paddle.x - paddle.speed);
  if (keys['ArrowRight'] || keys['d']) paddle.x = Math.min(maxX, paddle.x + paddle.speed);

  // Ball on pad follows
  if (ball.onPad) {
    ball.x = paddle.x;
    ball.y = PADDLE_Y - BALL_R - 1;
  }

  moveBall(ball);

  // Extra balls
  extraBalls = extraBalls.filter(eb => {
    moveBall(eb, true);
    // Brick collision for extra balls too
    for (let i = 0; i < bricks.length; i++) {
      const br = bricks[i];
      if (!br.alive) continue;
      if (eb.x + BALL_R < br.x || eb.x - BALL_R > br.x + br.w + 4 ||
          eb.y + BALL_R < br.y || eb.y - BALL_R > br.y + br.h) continue;
      const fromLeft  = eb.x < br.x;
      const fromRight = eb.x > br.x + br.w + 4;
      if (fromLeft || fromRight) eb.vx *= -1; else eb.vy *= -1;
      br.hp--;
      br.shake = 5;
      score += br.pts;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
      SFX.hit(br.pts);
      spawnParticles(br.x + br.w/2, br.y + br.h/2, br.col.top, 10);
      if (br.hp <= 0) br.alive = false;
      break;
    }
    return eb.y < H + 20;
  });

  // Bonus paddle width decay
  if (bonusTimer > 0) {
    bonusTimer--;
    if (bonusTimer === 0) paddle.w = 80;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 0;
  }

  // Brick shakes
  bricks.forEach(b => { if (b.shake > 0) b.shake--; });

  updateParticles();
  updateBonusItems();
  updatePopups();
  checkWin();
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function draw() {
  drawBackground();

  if (state === 'idle' || state === 'over') return;

  // Bricks
  bricks.forEach(b => {
    if (!b.alive) return;
    const sx = b.shake > 0 ? (Math.random()-0.5)*3 : 0;
    const sy = b.shake > 0 ? (Math.random()-0.5)*2 : 0;
    drawLegoBrick(b.x + sx, b.y + sy, b.w, b.h, b.col, 1, b.hp, b.maxHp);
    // HP dots
    if (b.maxHp > 1) {
      for (let h = 0; h < b.maxHp; h++) {
        ctx.fillStyle = h < b.hp ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(b.x + b.w/2 - (b.maxHp-1)*4 + h*8, b.y + b.h - 8, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
  });

  // Bonus
  drawBonusItems();

  // Extra balls
  extraBalls.forEach(eb => {
    ctx.save();
    ctx.globalAlpha = 0.75;
    const g = ctx.createRadialGradient(eb.x-2, eb.y-2, 1, eb.x, eb.y, BALL_R);
    g.addColorStop(0,'#fff');
    g.addColorStop(1,'#aaa');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(eb.x, eb.y, BALL_R-1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Paddle
  drawPaddle();

  // Ball
  drawBall();

  // Particles & popups
  drawParticles();
  drawPopups();

  // Combo display
  if (combo > 2 && comboTimer > 0) {
    const alpha = Math.min(1, comboTimer / 20);
    comboEl.textContent = `COMBO ×${combo}!`;
    comboEl.style.opacity = alpha;
  } else {
    comboEl.style.opacity = 0;
  }

  // Ball on pad hint
  if (ball.onPad && state === 'playing') {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = 'bold 11px Nunito';
    ctx.textAlign = 'center';
    ctx.fillText('ESPACE pour lancer', W/2, H - 18);
  }

  // Win flash
  if (state === 'win') {
    ctx.fillStyle = `rgba(245,166,35,${0.2 + 0.1*Math.sin(Date.now()*0.01)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ══════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════
function loop(ts) {
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
// OVERLAY
// ══════════════════════════════════════════════
function showOverlay(type) {
  overlay.classList.remove('hidden');
  ovScore.style.display = 'none';
  if (type === 'idle') {
    ovTitle.innerHTML = 'BRICK<br>BREAKER';
    ovSub.innerHTML = '← → pour déplacer<br>ESPACE pour lancer';
  } else if (type === 'over') {
    ovTitle.innerHTML = 'GAME<br>OVER';
    ovScore.style.display = 'block';
    ovScore.textContent = score;
    ovSub.innerHTML = 'Appuyez sur Jouer\npour recommencer';
  }
}

function hideOverlay() {
  overlay.classList.add('hidden');
}

// ══════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════
function updateLivesHUD() {
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement('div');
    d.className = 'life-ball' + (i >= lives ? ' lost' : '');
    livesEl.appendChild(d);
  }
}

// ══════════════════════════════════════════════
// START / RESET
// ══════════════════════════════════════════════
function startGame() {
  SFX.init();
  score = 0; lives = MAX_LIVES; level = 1; combo = 0;
  scoreEl.textContent = 0;
  lvlEl.textContent = 1;
  updateLivesHUD();
  paddle.x = W/2; paddle.w = 80;
  ball.x = W/2; ball.y = PADDLE_Y - BALL_R - 1;
  ball.vx = 0; ball.vy = 0; ball.onPad = true;
  extraBalls = []; bonusItems = []; particles = []; popups = [];
  initBricks();
  hideOverlay();
  state = 'playing';
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); SFX.init(); launchBall(); }
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') { state = 'paused'; overlay.classList.remove('hidden'); ovTitle.textContent = 'PAUSE'; ovSub.textContent = 'P pour continuer'; }
    else if (state === 'paused') { state = 'playing'; hideOverlay(); }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch / mouse for paddle
let touchX = null;
canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  paddle.x = Math.max(paddle.w/2+2, Math.min(W-paddle.w/2-2,
    (e.clientX - rect.left) * (W / rect.width)));
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddle.x = Math.max(paddle.w/2+2, Math.min(W-paddle.w/2-2,
    (e.touches[0].clientX - rect.left) * (W / rect.width)));
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  SFX.init();
  launchBall();
});
canvas.addEventListener('click', () => { SFX.init(); launchBall(); });

btnStart.addEventListener('click', startGame);

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
updateLivesHUD();
showOverlay('idle');
requestAnimationFrame(loop);
</script>
</body>
