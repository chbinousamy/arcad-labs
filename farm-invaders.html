<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Invaders 🌾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --sky: #87CEEB;
    --grass: #4CAF50;
    --earth: #8B4513;
    --sun: #FFD700;
    --barn-red: #C0392B;
    --wood: #D2691E;
    --cream: #FFF8DC;
    --shadow: #2d4a1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #title-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0a1a00 0%, #1a3a00 50%, #2a5a00 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
  }

  #title-screen h1 {
    font-size: clamp(24px, 5vw, 48px);
    color: #FFD700;
    text-shadow: 4px 4px 0 #8B4513, 0 0 30px #FFD700aa;
    letter-spacing: 4px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 4px 4px 0 #8B4513, 0 0 30px #FFD700aa; }
    50% { text-shadow: 4px 4px 0 #8B4513, 0 0 60px #FFD700; }
  }

  .title-emoji {
    font-size: clamp(40px, 8vw, 80px);
    animation: bounce 0.8s ease-in-out infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
  }

  .preview-row {
    display: flex;
    gap: 16px;
    font-size: clamp(24px, 4vw, 40px);
    animation: sway 2s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
  }

  .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2vw, 16px);
    padding: 16px 32px;
    background: #C0392B;
    color: #FFD700;
    border: 4px solid #FFD700;
    cursor: pointer;
    animation: blink 1s step-end infinite;
    letter-spacing: 2px;
    margin-top: 8px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .start-btn:hover { background: #e74c3c; animation: none; }

  .instructions {
    color: #a8d8a8;
    font-size: clamp(6px, 1.2vw, 10px);
    text-align: center;
    line-height: 2;
  }

  #game-wrapper {
    position: relative;
    display: none;
  }

  canvas {
    display: block;
    border: 4px solid #8B4513;
    box-shadow: 0 0 40px #4CAF5066, 8px 8px 0 #2d4a1e;
    image-rendering: pixelated;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 8px 12px;
    background: #1a3a00;
    border: 4px solid #8B4513;
    border-bottom: none;
    color: #FFD700;
    font-size: clamp(7px, 1.5vw, 11px);
  }

  #hud span { letter-spacing: 1px; }

  #lives-display { color: #ff6b6b; letter-spacing: 4px; }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 50;
  }

  #overlay.show { display: flex; }

  #overlay h2 {
    font-size: clamp(16px, 3vw, 32px);
    color: #FFD700;
    text-shadow: 3px 3px 0 #8B4513;
    text-align: center;
  }

  #overlay p {
    color: #a8d8a8;
    font-size: clamp(8px, 1.5vw, 12px);
    text-align: center;
    line-height: 2;
  }

  #overlay button {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.5vw, 12px);
    padding: 12px 24px;
    background: #C0392B;
    color: #FFD700;
    border: 3px solid #FFD700;
    cursor: pointer;
  }

  #overlay button:hover { background: #e74c3c; }

  #mobile-controls {
    display: none;
    gap: 12px;
    margin-top: 12px;
  }

  .ctrl-btn {
    font-size: 28px;
    padding: 14px 20px;
    background: #2d4a1e;
    border: 3px solid #4CAF50;
    color: white;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    border-radius: 4px;
    active-transform: scale(0.95);
  }

  .ctrl-btn:active { background: #4CAF50; transform: scale(0.92); }

  @media (max-width: 600px), (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <div class="title-emoji">🌾</div>
  <h1>FARM INVADERS</h1>
  <div class="preview-row">🐔 🥕 🐷 🍎 🐄 🥦 🐑 🍅</div>
  <div class="instructions">
    ← → pour bouger<br>
    ESPACE pour tirer<br>
    Protège ta ferme !
  </div>
  <button class="start-btn" onclick="startGame()">▶ JOUER</button>
</div>

<!-- Game -->
<div id="game-wrapper">
  <div id="hud">
    <span>SCORE: <span id="score-val">0</span></span>
    <span>VAGUE: <span id="wave-val">1</span></span>
    <span id="lives-display">🚜🚜🚜</span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">GAME OVER</h2>
    <p id="overlay-msg"></p>
    <button onclick="restartGame()">↺ REJOUER</button>
  </div>
  <div id="mobile-controls">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-shoot">💥</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
</div>

<script>

// ── Audio Engine (Web Audio API – tout synthétisé, zéro fichier) ─────────────
const Audio = (() => {
  let ctx = null;
  let masterGain = null;
  // March bass notes (4 notes cycliques comme l'original)
  const marchNotes = [160, 130, 100, 80];
  let marchIdx = 0;
  let marchIntervalId = null;

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.55;
    masterGain.connect(ctx.destination);
  }

  // Utilitaire : enveloppe ADSR sur un GainNode
  function envelope(gainNode, t, atk, dec, sus, rel, peak = 1) {
    gainNode.gain.setValueAtTime(0, t);
    gainNode.gain.linearRampToValueAtTime(peak, t + atk);
    gainNode.gain.linearRampToValueAtTime(sus * peak, t + atk + dec);
    gainNode.gain.setValueAtTime(sus * peak, t + atk + dec + 0.01);
    gainNode.gain.linearRampToValueAtTime(0, t + atk + dec + rel);
  }

  // Son : tir joueur – laser court
  function shoot() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.18);
    envelope(g, t, 0.005, 0.03, 0.2, 0.15, 0.4);
    osc.start(t); osc.stop(t + 0.25);
  }

  // Son : explosion invader – bruit court
  function invaderDie() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.22, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 420;
    filt.Q.value = 0.7;
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    envelope(g, t, 0.002, 0.05, 0.3, 0.16, 0.7);
    src.start(t); src.stop(t + 0.25);
  }

  // Son : explosion joueur – boom grave
  function playerDie() {
    if (!ctx) return;
    const t = ctx.currentTime;
    // couche bruit
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const gN = ctx.createGain();
    src.connect(gN); gN.connect(masterGain);
    envelope(gN, t, 0.002, 0.1, 0.4, 0.55, 0.9);
    src.start(t); src.stop(t + 0.85);
    // couche tonale grave
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.6);
    const gO = ctx.createGain();
    osc.connect(gO); gO.connect(masterGain);
    envelope(gO, t, 0.005, 0.15, 0.3, 0.5, 0.6);
    osc.start(t); osc.stop(t + 0.75);
  }

  // Son : UFO – beep montant continu
  let ufoOsc = null, ufoGain = null;
  function ufoStart() {
    if (!ctx || ufoOsc) return;
    ufoOsc = ctx.createOscillator(); ufoOsc.type = 'square';
    ufoGain = ctx.createGain(); ufoGain.gain.value = 0.18;
    ufoOsc.connect(ufoGain); ufoGain.connect(masterGain);
    // LFO pour effet pulsant
    const lfo = ctx.createOscillator(); lfo.frequency.value = 8;
    const lfoG = ctx.createGain(); lfoG.gain.value = 80;
    lfo.connect(lfoG); lfoG.connect(ufoOsc.frequency);
    ufoOsc.frequency.value = 280;
    lfo.start(); ufoOsc.start();
  }
  function ufoStop() {
    if (!ufoOsc) return;
    try { ufoOsc.stop(); } catch(e) {}
    ufoOsc = null; ufoGain = null;
  }

  // Son : UFO détruit – sweep descendant
  function ufoExplode() {
    ufoStop();
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
    const g = ctx.createGain();
    osc.connect(g); g.connect(masterGain);
    envelope(g, t, 0.003, 0.05, 0.5, 0.4, 0.5);
    osc.start(t); osc.stop(t + 0.55);
  }

  // Son : balle ennemie (petit blip grave)
  function enemyShoot() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.linearRampToValueAtTime(80, t + 0.12);
    const g = ctx.createGain();
    osc.connect(g); g.connect(masterGain);
    envelope(g, t, 0.003, 0.02, 0.2, 0.1, 0.25);
    osc.start(t); osc.stop(t + 0.16);
  }

  // Son : bunker touché – crunch
  function bunkerHit() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 800;
    const g = ctx.createGain();
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    envelope(g, t, 0.001, 0.01, 0.4, 0.05, 0.3);
    src.start(t); src.stop(t + 0.07);
  }

  // Marche des invaders (4 notes graves alternées)
  function startMarch(period /* ms */) {
    stopMarch();
    function beat() {
      if (!ctx) return;
      const t = ctx.currentTime;
      const freq = marchNotes[marchIdx % 4];
      marchIdx++;
      const osc = ctx.createOscillator(); osc.type = 'square';
      osc.frequency.value = freq;
      const g = ctx.createGain();
      osc.connect(g); g.connect(masterGain);
      envelope(g, t, 0.005, 0.02, 0.5, 0.07, 0.3);
      osc.start(t); osc.stop(t + 0.12);
    }
    beat();
    marchIntervalId = setInterval(beat, Math.max(80, period));
  }
  function stopMarch() {
    if (marchIntervalId) { clearInterval(marchIntervalId); marchIntervalId = null; }
  }
  function updateMarchTempo(period) {
    if (marchIntervalId) { stopMarch(); startMarch(period); }
  }

  // Son : niveau gagné – fanfare
  function levelWin() {
    if (!ctx) return;
    const melody = [523, 659, 784, 1047]; // do mi sol do'
    melody.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.13;
      const osc = ctx.createOscillator(); osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = ctx.createGain();
      osc.connect(g); g.connect(masterGain);
      envelope(g, t, 0.005, 0.04, 0.5, 0.1, 0.5);
      osc.start(t); osc.stop(t + 0.18);
    });
  }

  // Son : game over – descente dramatique
  function gameOver() {
    if (!ctx) return;
    const notes = [400, 300, 200, 100];
    notes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.22;
      const osc = ctx.createOscillator(); osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const g = ctx.createGain();
      osc.connect(g); g.connect(masterGain);
      envelope(g, t, 0.01, 0.06, 0.4, 0.18, 0.55);
      osc.start(t); osc.stop(t + 0.3);
    });
  }

  return { init, shoot, invaderDie, playerDie, ufoStart, ufoStop, ufoExplode,
           enemyShoot, bunkerHit, startMarch, stopMarch, updateMarchTempo, levelWin, gameOver };
})();

// ===================== CONFIG =====================
const COLS = 10, ROWS = 4;
const ENEMY_EMOJIS = [
  ['🐔','🐣','🦆','🐦'], // row 0 - birds
  ['🐷','🐗','🐾','🦔'], // row 1 - pigs & friends
  ['🥕','🥦','🌽','🧅'], // row 2 - veggies
  ['🍎','🍅','🍓','🍑'], // row 3 - fruits
];
const POINTS = [40, 30, 20, 10];
const PLAYER_EMOJI = '🚜';
const BULLET_EMOJI = '💥';
const BOMB_EMOJI = '💩';
const BUNKER_EMOJI = '🏚️';
const UFO_EMOJI = '🛸';
const STAR_EMOJI = '⭐';

let canvas, ctx, W, H;
let gameState = 'idle'; // idle, playing, paused, over, win
let score = 0, lives = 3, wave = 1;
let player, bullets, enemies, bombs, particles, bunkers;
let ufo, ufoTimer;
let enemyDir = 1, enemySpeed, enemyDropTimer;
let frameId, lastTime = 0;
let keys = {};
let shootCooldown = 0;
let waveTransition = false;
let stars = [];

// Font size for emoji drawing
let emojiSize;

function initCanvas() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  const vw = Math.min(window.innerWidth - 24, 700);
  const vh = Math.min(window.innerHeight - 180, 520);
  W = Math.max(400, Math.min(vw, 700));
  H = Math.max(340, Math.min(vh, 520));
  canvas.width = W;
  canvas.height = H;
  emojiSize = Math.floor(W / 16);
  document.getElementById('game-wrapper').style.width = W + 'px';
}

function initGame() {
  score = 0; lives = 3; wave = 1;
  waveTransition = false;
  initWave();
  updateHUD();
}

function initWave() {
  enemyDir = 1;
  enemySpeed = 0.3 + wave * 0.15;
  enemyDropTimer = 0;
  ufo = null;
  ufoTimer = 600 + Math.random() * 800;

  // Player
  player = { x: W / 2, y: H - emojiSize * 1.2, speed: W * 0.004, shooting: false };

  // Bullets & bombs
  bullets = [];
  bombs = [];
  particles = [];

  // Enemies grid
  enemies = [];
  const marginX = emojiSize * 1.4;
  const marginY = emojiSize * 2.2;
  const gridW = W - marginX * 2;
  const cellW = gridW / COLS;
  const cellH = emojiSize * 1.5;
  const rowEmojis = wave <= 4 ? ENEMY_EMOJIS : ENEMY_EMOJIS.map(r => [...r].reverse());

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const emojiArr = ENEMY_EMOJIS[r];
      enemies.push({
        x: marginX + c * cellW + cellW / 2,
        y: marginY + r * cellH,
        emoji: emojiArr[(wave + c) % emojiArr.length],
        row: r, col: c,
        alive: true,
        animOffset: Math.random() * Math.PI * 2
      });
    }
  }

  // Bunkers
  bunkers = [];
  const bCount = 4;
  for (let i = 0; i < bCount; i++) {
    bunkers.push({
      x: (W / (bCount + 1)) * (i + 1),
      y: H - emojiSize * 3.2,
      hp: 3 + Math.floor(wave / 2),
      maxHp: 3 + Math.floor(wave / 2)
    });
  }

  // Stars background
  stars = Array.from({length: 60}, () => ({
    x: Math.random() * W, y: Math.random() * H * 0.6,
    r: Math.random() * 1.5 + 0.5,
    speed: Math.random() * 0.3 + 0.1,
    alpha: Math.random() * 0.6 + 0.4
  }));
}

// ===================== DRAW =====================
function drawEmoji(emoji, x, y, size, alpha = 1, angle = 0) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (angle !== 0) {
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillText(emoji, 0, 0);
  } else {
    ctx.fillText(emoji, x, y);
  }
  ctx.restore();
}

function drawBackground(t) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d1b2a');
  grad.addColorStop(0.7, '#1a3a2a');
  grad.addColorStop(1, '#2d4a1e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.alpha = 0.4 + Math.sin(t * s.speed + s.x) * 0.3;
    ctx.fillStyle = `rgba(255,255,220,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ground
  const groundY = H - emojiSize * 0.8;
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, '#4CAF50');
  gGrad.addColorStop(0.3, '#388E3C');
  gGrad.addColorStop(1, '#1B5E20');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Ground line glow
  ctx.strokeStyle = '#81C784';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY); ctx.lineTo(W, groundY);
  ctx.stroke();

  // Score line
  ctx.strokeStyle = '#4CAF5044';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(0, H - emojiSize * 1.8);
  ctx.lineTo(W, H - emojiSize * 1.8);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawEnemies(t) {
  enemies.forEach(e => {
    if (!e.alive) return;
    const bob = Math.sin(t * 2 + e.animOffset) * 3;
    drawEmoji(e.emoji, e.x, e.y + bob, emojiSize * 0.85);
  });
}

function drawPlayer() {
  drawEmoji(PLAYER_EMOJI, player.x, player.y, emojiSize * 1.1);
  // engine glow
  ctx.save();
  const grd = ctx.createRadialGradient(player.x, player.y + emojiSize * 0.5, 0, player.x, player.y + emojiSize * 0.5, emojiSize * 0.6);
  grd.addColorStop(0, 'rgba(255, 200, 50, 0.5)');
  grd.addColorStop(1, 'rgba(255, 100, 0, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(player.x, player.y + emojiSize * 0.5, emojiSize * 0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBullets() {
  bullets.forEach(b => {
    drawEmoji('🌟', b.x, b.y, emojiSize * 0.7);
  });
}

function drawBombs() {
  bombs.forEach(b => {
    drawEmoji(BOMB_EMOJI, b.x, b.y, emojiSize * 0.75, 1, b.angle || 0);
  });
}

function drawBunkers() {
  bunkers.forEach(b => {
    if (b.hp <= 0) return;
    const alpha = 0.4 + (b.hp / b.maxHp) * 0.6;
    drawEmoji('🌿', b.x - emojiSize * 0.6, b.y, emojiSize * 0.9, alpha);
    drawEmoji('🌿', b.x, b.y, emojiSize * 0.9, alpha);
    drawEmoji('🌿', b.x + emojiSize * 0.6, b.y, emojiSize * 0.9, alpha);
    // HP bar
    const barW = emojiSize * 1.8;
    ctx.fillStyle = '#333';
    ctx.fillRect(b.x - barW/2, b.y + emojiSize * 0.6, barW, 4);
    ctx.fillStyle = b.hp / b.maxHp > 0.5 ? '#4CAF50' : b.hp / b.maxHp > 0.25 ? '#FFC107' : '#F44336';
    ctx.fillRect(b.x - barW/2, b.y + emojiSize * 0.6, barW * (b.hp / b.maxHp), 4);
  });
}

function drawUFO(t) {
  if (!ufo || !ufo.alive) return;
  const bob = Math.sin(t * 4) * 3;
  drawEmoji(UFO_EMOJI, ufo.x, ufo.y + bob, emojiSize * 1.1);
  // Glow
  ctx.save();
  const grd = ctx.createRadialGradient(ufo.x, ufo.y + bob, 0, ufo.x, ufo.y + bob, emojiSize);
  grd.addColorStop(0, 'rgba(0, 200, 255, 0.3)');
  grd.addColorStop(1, 'rgba(0, 200, 255, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(ufo.x, ufo.y + bob, emojiSize, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, p.x, p.y);
    ctx.restore();
  });
}

function drawHUD_canvas(t) {
  // Wave text center top
  if (waveTransition) {
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.font = `${emojiSize * 0.9}px 'Press Start 2P', monospace`;
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`VAGUE ${wave}`, W / 2, H / 2);
    ctx.restore();
  }
}

// ===================== UPDATE =====================
let enemyMoveAccum = 0;
let bombAccum = 0;

function update(dt, t) {
  // Player movement
  if (keys['ArrowLeft'] || keys['a'] || keys['mobile_left']) {
    player.x = Math.max(emojiSize * 0.7, player.x - player.speed * dt);
  }
  if (keys['ArrowRight'] || keys['d'] || keys['mobile_right']) {
    player.x = Math.min(W - emojiSize * 0.7, player.x + player.speed * dt);
  }

  // Shooting
  shootCooldown -= dt;
  if ((keys[' '] || keys['mobile_shoot']) && shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - emojiSize * 0.6, speed: H * 0.007 });
    shootCooldown = 280;
  }

  // Move bullets
  bullets = bullets.filter(b => b.y > -emojiSize);
  bullets.forEach(b => b.y -= b.speed * dt);

  // Move bombs
  bombs.forEach(b => {
    b.y += b.speed * dt;
    b.angle = (b.angle || 0) + 0.05;
  });
  bombs = bombs.filter(b => b.y < H + emojiSize);

  // Enemy movement
  const aliveEnemies = enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0) { nextWave(); return; }

  enemyMoveAccum += dt;
  const moveInterval = Math.max(80, 600 - wave * 40 - (COLS * ROWS - aliveEnemies.length) * 3);
  if (enemyMoveAccum >= moveInterval) {
    enemyMoveAccum = 0;
    const xs = aliveEnemies.map(e => e.x);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    let drop = false;
    if (maxX + enemySpeed * 24 > W - emojiSize * 0.5 && enemyDir > 0) drop = true;
    if (minX - enemySpeed * 24 < emojiSize * 0.5 && enemyDir < 0) drop = true;
    if (drop) {
      enemies.forEach(e => { if (e.alive) e.y += emojiSize * 0.5; });
      enemyDir *= -1;
    } else {
      enemies.forEach(e => { if (e.alive) e.x += enemyDir * enemySpeed * moveInterval; });
    }
  }

  // Enemy bombs
  bombAccum += dt;
  const bombInterval = Math.max(400, 1800 - wave * 100);
  if (bombAccum >= bombInterval) {
    bombAccum = 0;
    // Pick random column bottom enemy
    const cols = {};
    aliveEnemies.forEach(e => {
      if (!cols[e.col] || e.row > cols[e.col].row) cols[e.col] = e;
    });
    const shooters = Object.values(cols);
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      bombs.push({ x: shooter.x, y: shooter.y + emojiSize * 0.5, speed: H * 0.003 + wave * 0.0005 });
    }
  }

  // UFO
  ufoTimer -= dt;
  if (ufoTimer <= 0 && !ufo) {
    ufo = { x: -emojiSize, y: emojiSize * 1.5, dir: 1, speed: W * 0.0025, alive: true };
    ufoTimer = 600 + Math.random() * 600;
  }
  if (ufo && ufo.alive) {
    ufo.x += ufo.dir * ufo.speed * dt;
    if (ufo.x > W + emojiSize * 2 || ufo.x < -emojiSize * 2) ufo = null;
  }

  // Bullet-enemy collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.abs(b.x - e.x) < emojiSize * 0.8 && Math.abs(b.y - e.y) < emojiSize * 0.8) {
        e.alive = false;
        b.dead = true;
        score += POINTS[e.row];
        updateHUD();
        spawnParticles(e.x, e.y, e.emoji);
      }
    });
    // UFO
    if (ufo && ufo.alive && Math.abs(b.x - ufo.x) < emojiSize && Math.abs(b.y - ufo.y) < emojiSize) {
      ufo.alive = false;
      b.dead = true;
      score += 200;
      updateHUD();
      spawnParticles(ufo.x, ufo.y, UFO_EMOJI);
    }
    // Bunkers
    bunkers.forEach(bk => {
      if (bk.hp <= 0) return;
      if (Math.abs(b.x - bk.x) < emojiSize && Math.abs(b.y - bk.y) < emojiSize * 0.8) {
        bk.hp--;
        b.dead = true;
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);

  // Bomb-player collision
  bombs.forEach(b => {
    if (Math.abs(b.x - player.x) < emojiSize * 0.8 && Math.abs(b.y - player.y) < emojiSize * 0.8) {
      b.dead = true;
      loseLife();
    }
    // Bomb-bunker
    bunkers.forEach(bk => {
      if (bk.hp <= 0) return;
      if (Math.abs(b.x - bk.x) < emojiSize && Math.abs(b.y - bk.y) < emojiSize * 0.8) {
        bk.hp = Math.max(0, bk.hp - 1);
        b.dead = true;
      }
    });
  });
  bombs = bombs.filter(b => !b.dead);

  // Enemy reaches bottom
  aliveEnemies.forEach(e => {
    if (e.y > H - emojiSize * 2) {
      gameOver();
    }
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt * 0.05;
    p.y += p.vy * dt * 0.05;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);
}

function spawnParticles(x, y, emoji) {
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      emoji: i % 2 === 0 ? emoji : '✨',
      size: emojiSize * 0.6,
      life: 400 + Math.random() * 300,
      maxLife: 700
    });
  }
}

function loseLife() {
  lives--;
  updateHUD();
  spawnParticles(player.x, player.y, '💥');
  if (lives <= 0) { gameOver(); return; }
  // Flash
  canvas.style.outline = '4px solid red';
  setTimeout(() => canvas.style.outline = '', 300);
}

function gameOver() {
  gameState = 'over';
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = lives <= 0 ? '💀 GAME OVER' : '🐄 ENVAHI !';
  document.getElementById('overlay-msg').textContent = `Score final: ${score}\nVague atteinte: ${wave}`;
  ov.classList.add('show');
  cancelAnimationFrame(frameId);
}

function nextWave() {
  wave++;
  waveTransition = true;
  updateHUD();
  setTimeout(() => {
    waveTransition = false;
    initWave();
  }, 1800);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('wave-val').textContent = wave;
  const livesIcons = ['', '🚜', '🚜🚜', '🚜🚜🚜'];
  document.getElementById('lives-display').textContent = livesIcons[Math.max(0, Math.min(3, lives))];
}

// ===================== LOOP =====================
function loop(ts) {
  if (gameState !== 'playing') return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  const t = ts / 1000;

  update(dt, t);
  drawBackground(t);
  drawBunkers();
  drawEnemies(t);
  drawUFO(t);
  drawPlayer();
  drawBullets();
  drawBombs();
  drawParticles();
  drawHUD_canvas(t);

  frameId = requestAnimationFrame(loop);
}

// ===================== INPUT =====================
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile buttons
function setupMobile() {
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  const btnS = document.getElementById('btn-shoot');
  ['touchstart','mousedown'].forEach(ev => {
    btnL.addEventListener(ev, e => { e.preventDefault(); keys['mobile_left'] = true; });
    btnR.addEventListener(ev, e => { e.preventDefault(); keys['mobile_right'] = true; });
    btnS.addEventListener(ev, e => { e.preventDefault(); keys['mobile_shoot'] = true; });
  });
  ['touchend','mouseup'].forEach(ev => {
    btnL.addEventListener(ev, e => { keys['mobile_left'] = false; });
    btnR.addEventListener(ev, e => { keys['mobile_right'] = false; });
    btnS.addEventListener(ev, e => { keys['mobile_shoot'] = false; });
  });
}

// ===================== START =====================
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-wrapper').style.display = 'block';
  initCanvas();
  setupMobile();
  initGame();
  gameState = 'playing';
  lastTime = performance.now();
  frameId = requestAnimationFrame(loop);
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  initGame();
  gameState = 'playing';
  lastTime = performance.now();
  frameId = requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  if (gameState === 'playing' || gameState === 'over') {
    initCanvas();
    initWave();
  }
});
</script>
