<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astéro-Hache vs Arachnides</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: none;
  }

  #hud {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: min(800px, 100vw);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 16px;
    pointer-events: none;
    z-index: 10;
  }
  .hud-block { text-align: center; }
  .hud-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 3px;
    color: #334;
  }
  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #00ffe7;
    text-shadow: 0 0 10px #00ffe7aa;
    letter-spacing: 2px;
  }
  .hud-lives { display: flex; gap: 4px; margin-top: 2px; }
  .hud-life  { font-size: 14px; }

  #padIndicator {
    position: fixed;
    bottom: 12px; right: 16px;
    font-size: 10px;
    color: #334;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.3s;
    pointer-events: none;
    z-index: 10;
  }
  #padIndicator.active { color: #00ffe7; text-shadow: 0 0 8px #00ffe7; }

  #volControl {
    position: fixed;
    bottom: 12px; left: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }
  #volControl label { font-size: 9px; color: #334; letter-spacing: 2px; }
  #volSlider {
    -webkit-appearance: none;
    width: 70px; height: 3px;
    background: #1a1a3a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #volSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00ffe7;
    box-shadow: 0 0 6px #00ffe7;
  }
  #muteBtn {
    background: none; border: none;
    color: #556; font-size: 14px;
    cursor: pointer; line-height: 1;
    transition: color 0.2s;
  }
  #muteBtn:hover { color: #00ffe7; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="hudScore">000000</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">VIES</div>
    <div class="hud-lives" id="hudLives"></div>
  </div>
  <div class="hud-block">
    <div class="hud-label">VAGUE</div>
    <div class="hud-value" id="hudWave">01</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="padIndicator">🎮 AUCUN CONTRÔLEUR</div>

<div id="volControl">
  <button id="muteBtn" title="Mute">🔊</button>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
  <label for="volSlider">VOL</label>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 800, H = 600;

function resize() {
  const scale = Math.min(window.innerWidth / W, (window.innerHeight - 0) / H);
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════════════════════════
//  WEB AUDIO ENGINE
// ════════════════════════════════════════════════════════════
let audioCtx   = null;
let masterGain = null;
let muted      = false;

function ensureAudio() {
  if (audioCtx) return;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('volSlider').value);
  masterGain.connect(audioCtx.destination);
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone({ freq = 440, type = 'square', duration = 0.15,
                    gain = 0.28, attack = 0.008, decay = 0.05,
                    freqEnd = null, detune = 0 } = {}) {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), now + duration);
  osc.detune.value = detune;
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(gain, now + attack);
  env.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(duration, attack + 0.01));
  osc.connect(env);
  env.connect(masterGain);
  osc.start(now);
  osc.stop(now + duration + 0.05);
}

function playNoise({ duration = 0.1, gain = 0.2, freq = 800, q = 1 } = {}) {
  if (!audioCtx || muted) return;
  const now  = audioCtx.currentTime;
  const sr   = audioCtx.sampleRate;
  const buf  = audioCtx.createBuffer(1, Math.ceil(sr * duration), sr);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src  = audioCtx.createBufferSource();
  src.buffer = buf;
  const flt  = audioCtx.createBiquadFilter();
  flt.type   = 'bandpass';
  flt.frequency.value = freq;
  flt.Q.value = q;
  const env  = audioCtx.createGain();
  env.gain.setValueAtTime(gain, now);
  env.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  src.connect(flt); flt.connect(env); env.connect(masterGain);
  src.start(now);
}

const SFX = {
  shoot()     { playTone({ freq: 900, freqEnd: 1500, type: 'sawtooth', duration: 0.11, gain: 0.22, attack: 0.004, decay: 0.1 }); },
  enemyHit()  {
    playNoise({ duration: 0.07, gain: 0.3, freq: 1100, q: 2 });
    playTone({ freq: 280, freqEnd: 70, type: 'square', duration: 0.09, gain: 0.18, attack: 0.004, decay: 0.08 });
  },
  playerHit() {
    playNoise({ duration: 0.28, gain: 0.45, freq: 180, q: 0.5 });
    playTone({ freq: 110, freqEnd: 35, type: 'sawtooth', duration: 0.38, gain: 0.38, attack: 0.01, decay: 0.36 });
  },
  levelUp()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone({ freq: f, type: 'square', duration: 0.18, gain: 0.28 }), i * 100)); },
  gameOver()  { [380, 280, 180, 90].forEach((f, i) => setTimeout(() => playTone({ freq: f, freqEnd: f * 0.5, type: 'sawtooth', duration: 0.24, gain: 0.32 }), i * 210)); },
  enemyShoot(){ playTone({ freq: 180, freqEnd: 550, type: 'triangle', duration: 0.09, gain: 0.13, attack: 0.004, decay: 0.08 }); },
  bonus()     { playTone({ freq: 1100, freqEnd: 1800, type: 'sine', duration: 0.2, gain: 0.28, attack: 0.01, decay: 0.18 }); },
};

// Ambient engine hum
let engineOsc = null, engineGain = null;
function startEngine() {
  if (!audioCtx || engineOsc || muted) return;
  engineOsc  = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 52;
  engineGain.gain.value = 0.035;
  engineOsc.connect(engineGain);
  engineGain.connect(masterGain);
  engineOsc.start();
}
function stopEngine() {
  if (!engineOsc) return;
  try { engineOsc.stop(); } catch(e) {}
  engineOsc = null; engineGain = null;
}

document.getElementById('volSlider').addEventListener('input', e => {
  if (masterGain && !muted) masterGain.gain.value = parseFloat(e.target.value);
});
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = muted ? 0 : parseFloat(document.getElementById('volSlider').value);
  if (muted) stopEngine();
  else if (gameState === 'playing') { ensureAudio(); startEngine(); }
});

// ════════════════════════════════════════════════════════════
//  GAMEPAD MANAGER — ExtendedGamepad API
// ════════════════════════════════════════════════════════════
const Pad = {
  connected: false,
  index: -1,
  _prev: {},

  // Standard mapping indices
  BTN_A: 0, BTN_B: 1, BTN_X: 2, BTN_Y: 3,
  BTN_LB: 4, BTN_RB: 5, BTN_LT: 6, BTN_RT: 7,
  BTN_SELECT: 8, BTN_START: 9,
  BTN_L3: 10, BTN_R3: 11,
  BTN_UP: 12, BTN_DOWN: 13, BTN_LEFT: 14, BTN_RIGHT: 15,
  AXIS_LX: 0, AXIS_LY: 1, AXIS_RX: 2, AXIS_RY: 3,

  DEADZONE: 0.18,

  get gp() {
    if (!navigator.getGamepads) return null;
    return navigator.getGamepads()[this.index] || null;
  },

  axis(i) {
    const gp = this.gp;
    if (!gp || gp.axes[i] === undefined) return 0;
    const v = gp.axes[i];
    return Math.abs(v) < this.DEADZONE ? 0 : v;
  },

  btn(i) {
    const gp = this.gp;
    if (!gp || !gp.buttons[i]) return false;
    const b = gp.buttons[i];
    return typeof b === 'object' ? b.pressed || b.value > 0.5 : b > 0.5;
  },

  // Front montant (appui unique)
  pressed(i) {
    const cur = this.btn(i);
    const was = !!this._prev[i];
    this._prev[i] = cur;
    return cur && !was;
  },

  rumble(duration = 100, weak = 0.3, strong = 0.1) {
    const gp = this.gp;
    if (!gp) return;
    if (gp.vibrationActuator) {
      gp.vibrationActuator.playEffect('dual-rumble', {
        startDelay: 0, duration,
        weakMagnitude: weak,
        strongMagnitude: strong
      }).catch(() => {});
    }
  }
};

window.addEventListener('gamepadconnected', e => {
  Pad.connected = true;
  Pad.index     = e.gamepad.index;
  const el = document.getElementById('padIndicator');
  el.textContent = '🎮 ' + (e.gamepad.id || 'CONTRÔLEUR').substring(0, 30);
  el.classList.add('active');
});
window.addEventListener('gamepaddisconnected', () => {
  Pad.connected = false;
  Pad.index     = -1;
  const el = document.getElementById('padIndicator');
  el.textContent = '🎮 AUCUN CONTRÔLEUR';
  el.classList.remove('active');
});

// ════════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════════
const Keys = {};
window.addEventListener('keydown', e => {
  Keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  ensureAudio(); resumeAudio();
});
window.addEventListener('keyup', e => { Keys[e.code] = false; });

// ════════════════════════════════════════════════════════════
//  STARFIELD
// ════════════════════════════════════════════════════════════
const STARS = Array.from({ length: 130 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.4 + 0.3,
  speed: Math.random() * 0.9 + 0.15,
  alpha: Math.random() * 0.6 + 0.3,
  twinkle: Math.random() * Math.PI * 2
}));

function drawStars(dt) {
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, W, H);
  for (const s of STARS) {
    s.y += s.speed * dt * 60;
    s.twinkle += dt * 2;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    ctx.globalAlpha = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
    ctx.fillStyle = '#c8d4ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ════════════════════════════════════════════════════════════
//  DRAW PRIMITIVES
// ════════════════════════════════════════════════════════════

function drawAxe(x, y, angle = -Math.PI / 2, size = 16) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Manche
  ctx.fillStyle = '#7a4f2a';
  ctx.beginPath();
  ctx.roundRect(-size * 0.11, -size * 0.55, size * 0.22, size * 1.05, 2);
  ctx.fill();

  // Lame
  ctx.fillStyle = '#ccd4e8';
  ctx.strokeStyle = '#00ffe7';
  ctx.lineWidth = 1.3;
  ctx.shadowColor = '#00ffe7';
  ctx.shadowBlur  = 6;
  ctx.beginPath();
  ctx.moveTo(-size * 0.11, -size * 0.52);
  ctx.lineTo(-size * 0.68, -size * 0.82);
  ctx.lineTo(-size * 0.82, -size * 0.28);
  ctx.lineTo(-size * 0.11, -size * 0.08);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Reflet
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath();
  ctx.moveTo(-size * 0.14, -size * 0.5);
  ctx.lineTo(-size * 0.52, -size * 0.72);
  ctx.lineTo(-size * 0.32, -size * 0.3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawSpider(x, y, size = 22, color = '#aa22ff', phase = 0) {
  ctx.save();
  ctx.translate(x, y);
  const lw = Math.sin(phase) * 0.28;

  // Pattes
  ctx.lineWidth = 1.5;
  const angles = [-0.85, -0.4, 0.4, 0.85];
  angles.forEach((a, i) => {
    const w = (i % 2 === 0 ? 1 : -1) * lw;
    ctx.strokeStyle = color;
    // Gauche
    ctx.beginPath();
    ctx.moveTo(-size * 0.38, 0);
    ctx.quadraticCurveTo(-size * 0.88, Math.sin(a + w) * size * 0.55, -size * 1.08, Math.sin(a + w) * size * 0.88);
    ctx.stroke();
    // Droite
    ctx.beginPath();
    ctx.moveTo(size * 0.38, 0);
    ctx.quadraticCurveTo(size * 0.88, Math.sin(a + w) * size * 0.55, size * 1.08, Math.sin(a + w) * size * 0.88);
    ctx.stroke();
  });

  // Abdomen
  const g1 = ctx.createRadialGradient(0, size * 0.14, 0, 0, size * 0.14, size * 0.48);
  g1.addColorStop(0, '#cc44ff'); g1.addColorStop(1, '#3a0055');
  ctx.fillStyle = g1;
  ctx.beginPath();
  ctx.ellipse(0, size * 0.14, size * 0.44, size * 0.53, 0, 0, Math.PI * 2);
  ctx.fill();

  // Céphalothorax
  const g2 = ctx.createRadialGradient(0, -size * 0.19, 0, 0, -size * 0.19, size * 0.31);
  g2.addColorStop(0, '#dd55ff'); g2.addColorStop(1, '#280044');
  ctx.fillStyle = g2;
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.19, size * 0.31, size * 0.27, 0, 0, Math.PI * 2);
  ctx.fill();

  // Yeux
  ctx.fillStyle = '#ff2244';
  ctx.shadowColor = '#ff0033'; ctx.shadowBlur = 5;
  [[-0.17, -0.27], [0.17, -0.27], [-0.09, -0.14], [0.09, -0.14]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.arc(ex * size, ey * size, size * 0.065, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Motif dos
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath();
  ctx.ellipse(0, size * 0.18, size * 0.13, size * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPlayer(x, y, invincible = false) {
  if (invincible && Math.floor(Date.now() / 75) % 2 === 0) return;
  ctx.save();
  ctx.translate(x, y);

  // Propulseur
  const flicker = 0.6 + Math.random() * 0.4;
  ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 18 * flicker;
  ctx.fillStyle = `rgba(0,255,231,${0.35 * flicker})`;
  ctx.beginPath();
  ctx.ellipse(0, 20, 8 + flicker * 3, 14 + flicker * 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Carlingue
  ctx.fillStyle = '#080820';
  ctx.strokeStyle = '#00ffe7';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, -24);
  ctx.lineTo(20, 10);
  ctx.lineTo(12, 18);
  ctx.lineTo(0, 13);
  ctx.lineTo(-12, 18);
  ctx.lineTo(-20, 10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;

  // Hache sur le fuselage
  drawAxe(0, -2, -Math.PI / 2, 19);

  // Cockpit
  ctx.fillStyle = 'rgba(0,255,231,0.18)';
  ctx.strokeStyle = 'rgba(0,255,231,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, -9, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

// ── Particles ──
const particles = [];
function spawnExplosion(x, y, color = '#ff6600', count = 18) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.6;
    const spd   = Math.random() * 200 + 60;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: Math.random() * 1.6 + 0.9,
      r: Math.random() * 3.5 + 1,
      color
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.91; p.vy *= 0.91;
    p.life -= p.decay * dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Flash & Shake ──
let flashAlpha = 0, flashColor = '#fff';
function triggerFlash(c = '#fff', a = 0.4) { flashColor = c; flashAlpha = Math.max(flashAlpha, a); }
function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.fillStyle   = flashColor;
  ctx.globalAlpha = flashAlpha;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  flashAlpha = Math.max(0, flashAlpha - 0.045);
}

let shakePow = 0;
function triggerShake(v = 8) { shakePow = Math.max(shakePow, v); }
function applyShake() {
  if (shakePow < 0.5) { shakePow = 0; return; }
  ctx.translate((Math.random() - 0.5) * shakePow * 2, (Math.random() - 0.5) * shakePow * 2);
  shakePow *= 0.78;
}

// ════════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════════
let gameState = 'title';
let score = 0, lives = 3, wave = 1;
let hiScore = parseInt(localStorage.getItem('ah_hiscore') || '0');

const player = {
  x: W / 2, y: H - 62,
  w: 40, h: 40,
  speed: 290,
  shootCooldown: 0,
  shootRate: 0.21,
  invincible: 0,
  bullets: []
};

let enemies       = [];
let enemyDir      = 1;
let enemyMoveTimer = 0;
let enemyBullets  = [];
let enemyShootTimer = 0;
let bonuses       = [];
let levelUpTimer  = 0;
let prevStartBtn  = false;

function spawnWave(n) {
  enemies = [];
  enemyDir = 1;
  enemyMoveTimer = 0;
  const cols    = Math.min(8 + n, 11);
  const rows    = Math.min(2 + Math.floor(n / 2), 5);
  const spacingX = Math.min(68, (W - 100) / cols);
  const spacingY = 54;
  const startX   = (W - (cols - 1) * spacingX) / 2;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: startX + c * spacingX,
        y: 75 + r * spacingY,
        w: 26, h: 26,
        hp: 1 + Math.floor(n / 3),
        maxHp: 1 + Math.floor(n / 3),
        phase: Math.random() * Math.PI * 2,
        color: ['#aa22ff', '#ff22aa', '#2266ff'][r % 3]
      });
    }
  }
  enemyBullets = [];
  bonuses      = [];
}

function collides(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
         Math.abs(a.y - b.y) < (a.h + b.h) / 2;
}

// ════════════════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('hudScore').textContent = String(score).padStart(6, '0');
  document.getElementById('hudWave').textContent  = String(wave).padStart(2, '0');
  const el = document.getElementById('hudLives');
  el.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const s = document.createElement('span');
    s.className = 'hud-life';
    s.textContent = '🚀';
    el.appendChild(s);
  }
}

// ════════════════════════════════════════════════════════════
//  TEXT HELPER
// ════════════════════════════════════════════════════════════
function drawText(text, x, y, { size = 16, color = '#00ffe7', font = 'Orbitron', weight = '700', alpha = 1, shadow = null, align = 'center' } = {}) {
  ctx.save();
  ctx.globalAlpha   = alpha;
  ctx.font          = `${weight} ${size}px '${font}', monospace`;
  ctx.fillStyle     = color;
  ctx.textAlign     = align;
  ctx.textBaseline  = 'middle';
  if (shadow) { ctx.shadowColor = shadow; ctx.shadowBlur = 18; }
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ════════════════════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════════════════════
function drawTitleScreen() {
  // Titre
  ctx.save();
  ctx.font = "900 40px 'Orbitron', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const grad = ctx.createLinearGradient(W/2 - 210, 0, W/2 + 210, 0);
  grad.addColorStop(0, '#00ffe7'); grad.addColorStop(0.5, '#ff00aa'); grad.addColorStop(1, '#00ffe7');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#00ffe799'; ctx.shadowBlur = 22;
  ctx.fillText('ASTÉRO-HACHE', W/2, H/2 - 115);
  ctx.restore();

  drawText('VS ARACHNIDES', W/2, H/2 - 68, { size: 21, color: '#ff00aa', shadow: '#ff00aa' });

  // Démos visuelles
  drawPlayer(W/2, H/2 + 5);
  drawSpider(W/2 - 95, H/2 + 5, 26, '#aa22ff', Date.now() / 280);
  drawSpider(W/2 + 95, H/2 + 5, 26, '#ff22aa', Date.now() / 280 + 1.5);

  const blink = Math.floor(Date.now() / 520) % 2 === 0;
  if (blink) drawText('[ FEU / ESPACE / A ] POUR COMMENCER', W/2, H/2 + 75, { size: 12, color: '#00ffe7', font: 'Share Tech Mono' });

  drawText('CLAVIER :  ← →  DÉPLACER    ESPACE  TIRER    ESC  PAUSE', W/2, H/2 + 106, { size: 10, color: '#445', font: 'Share Tech Mono' });
  drawText('GAMEPAD :  STICK G.  DÉPLACER    A / RT  TIRER    START  PAUSE', W/2, H/2 + 124, { size: 10, color: '#334', font: 'Share Tech Mono' });
  drawText(`RECORD : ${String(hiScore).padStart(6,'0')}`, W/2, H/2 + 158, { size: 14, color: '#ffd700', shadow: '#ffd700' });
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);
  drawText('PAUSE', W/2, H/2 - 22, { size: 46, color: '#00ffe7', shadow: '#00ffe7' });
  drawText('ESC / START : REPRENDRE', W/2, H/2 + 38, { size: 13, color: '#556', font: 'Share Tech Mono' });
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  drawText('GAME OVER', W/2, H/2 - 52, { size: 42, color: '#ff2244', shadow: '#ff2244' });
  drawText(`SCORE : ${String(score).padStart(6,'0')}`, W/2, H/2 + 8, { size: 22, color: '#ffd700', shadow: '#ffd700' });
  drawText(`RECORD : ${String(hiScore).padStart(6,'0')}`, W/2, H/2 + 42, { size: 14, color: '#556', font: 'Share Tech Mono' });
  if (Math.floor(Date.now() / 580) % 2 === 0)
    drawText('ESPACE / A : REJOUER', W/2, H/2 + 88, { size: 13, color: '#00ffe7', font: 'Share Tech Mono' });
}

function drawLevelUpScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  drawText(`VAGUE ${wave} TERMINÉE !`, W/2, H/2 - 28, { size: 30, color: '#ffd700', shadow: '#ffd700' });
  drawText(`VAGUE ${wave + 1} EN APPROCHE...`, W/2, H/2 + 22, { size: 16, color: '#00ffe7' });
}

// ════════════════════════════════════════════════════════════
//  INPUT POLL
// ════════════════════════════════════════════════════════════
function pollInput(dt) {
  // Mouvement
  let dx = 0;
  if (Keys['ArrowLeft']  || Keys['KeyA']) dx -= 1;
  if (Keys['ArrowRight'] || Keys['KeyD']) dx += 1;
  if (Pad.connected) {
    const ax = Pad.axis(Pad.AXIS_LX);
    if (ax !== 0) dx += ax;
    if (Pad.btn(Pad.BTN_LEFT))  dx -= 1;
    if (Pad.btn(Pad.BTN_RIGHT)) dx += 1;
  }
  dx = Math.max(-1, Math.min(1, dx));
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + dx * player.speed * dt));

  // Tir
  player.shootCooldown = Math.max(0, player.shootCooldown - dt);
  const wantsShoot = Keys['Space'] || Keys['KeyZ'] || Keys['KeyX'] ||
    (Pad.connected && (Pad.btn(Pad.BTN_A) || Pad.btn(Pad.BTN_RT) || Pad.btn(Pad.BTN_RB)));

  if (wantsShoot && player.shootCooldown <= 0) {
    player.bullets.push({ x: player.x, y: player.y - 22, vx: 0, vy: -530, w: 14, h: 14, spin: 0 });
    player.shootCooldown = player.shootRate;
    SFX.shoot();
  }

  // Pause
  const startNow = Pad.btn(Pad.BTN_START);
  if ((Keys['Escape'] || (startNow && !prevStartBtn))) {
    if (gameState === 'playing') { gameState = 'paused'; Keys['Escape'] = false; }
    else if (gameState === 'paused') { gameState = 'playing'; Keys['Escape'] = false; }
  }
  prevStartBtn = startNow;
}

// ════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════
function update(dt) {

  // Player bullets
  for (let i = player.bullets.length - 1; i >= 0; i--) {
    const b = player.bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt; b.spin += dt * 11;
    if (b.y < -20) { player.bullets.splice(i, 1); continue; }

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (collides(b, enemies[j])) {
        player.bullets.splice(i, 1);
        enemies[j].hp--;
        SFX.enemyHit();
        triggerFlash('#ffffff', 0.07);
        spawnExplosion(enemies[j].x, enemies[j].y, enemies[j].color, 10);

        if (enemies[j].hp <= 0) {
          score += 10 + wave * 5;
          if (score > hiScore) { hiScore = score; localStorage.setItem('ah_hiscore', hiScore); }
          spawnExplosion(enemies[j].x, enemies[j].y, enemies[j].color, 24);
          triggerFlash('#ffaa00', 0.11);
          triggerShake(4);
          Pad.rumble(80, 0.18, 0.05);

          if (Math.random() < 0.1)
            bonuses.push({ x: enemies[j].x, y: enemies[j].y, vy: 75, w: 18, h: 18 });

          enemies.splice(j, 1);
        }
        hit = true; break;
      }
    }
    if (hit) continue;
  }

  // Enemy movement
  if (enemies.length > 0) {
    const speed = 38 + wave * 10 + (1 - enemies.length / 55) * 75;
    enemyMoveTimer += dt;
    const tick = Math.max(0.035, 0.32 - wave * 0.022);

    if (enemyMoveTimer >= tick) {
      enemyMoveTimer = 0;
      let wall = false;
      for (const e of enemies) {
        e.x += enemyDir * speed * tick;
        e.phase += 0.2;
        if (e.x < 26 || e.x > W - 26) wall = true;
      }
      if (wall) { enemyDir *= -1; for (const e of enemies) e.y += 18; }
    }

    // Enemy shoot
    enemyShootTimer -= dt;
    if (enemyShootTimer <= 0) {
      enemyShootTimer = Math.max(0.55, 2.4 - wave * 0.16);
      const s = enemies[Math.floor(Math.random() * enemies.length)];
      if (s) { enemyBullets.push({ x: s.x, y: s.y + 14, vy: 195 + wave * 22, w: 8, h: 8 }); SFX.enemyShoot(); }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.y += b.vy * dt;
    if (b.y > H + 20) { enemyBullets.splice(i, 1); continue; }
    if (player.invincible <= 0 && collides(b, player)) {
      enemyBullets.splice(i, 1);
      lives--;
      player.invincible = 2.5;
      SFX.playerHit();
      triggerFlash('#ff0044', 0.5);
      triggerShake(14);
      Pad.rumble(280, 0.75, 0.45);
      spawnExplosion(player.x, player.y, '#ff4466', 28);
      if (lives <= 0) { SFX.gameOver(); gameState = 'gameover'; stopEngine(); }
    }
  }

  if (player.invincible > 0) player.invincible -= dt;

  // Enemy reaches bottom
  for (const e of enemies) {
    if (e.y > H - 75 && player.invincible <= 0) {
      lives = 0; SFX.gameOver(); gameState = 'gameover'; stopEngine(); break;
    }
  }

  // Bonuses
  for (let i = bonuses.length - 1; i >= 0; i--) {
    const b = bonuses[i];
    b.y += b.vy * dt;
    if (b.y > H + 20) { bonuses.splice(i, 1); continue; }
    if (collides(b, player)) {
      bonuses.splice(i, 1);
      lives = Math.min(lives + 1, 5);
      SFX.bonus();
      triggerFlash('#00ff88', 0.22);
    }
  }

  // Wave cleared
  if (enemies.length === 0 && gameState === 'playing') {
    SFX.levelUp();
    gameState    = 'levelup';
    levelUpTimer = 2.2;
  }

  if (gameState === 'levelup') {
    levelUpTimer -= dt;
    if (levelUpTimer <= 0) { wave++; spawnWave(wave); gameState = 'playing'; }
  }

  updateHUD();
}

// ════════════════════════════════════════════════════════════
//  DRAW GAME
// ════════════════════════════════════════════════════════════
function drawGame() {
  // Enemies
  for (const e of enemies) {
    const ratio = e.hp / e.maxHp;
    ctx.globalAlpha = 0.5 + ratio * 0.5;
    drawSpider(e.x, e.y, 21, e.color, e.phase);
    ctx.globalAlpha = 1;
    if (e.maxHp > 1) {
      ctx.fillStyle = '#1a0a2a';
      ctx.fillRect(e.x - 13, e.y + 15, 26, 3);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - 13, e.y + 15, 26 * ratio, 3);
    }
  }

  // Enemy bullets (orbes)
  for (const b of enemyBullets) {
    ctx.save();
    ctx.shadowColor = '#aa44ff'; ctx.shadowBlur = 10;
    ctx.fillStyle   = '#cc44ff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Player bullets (haches tournantes)
  for (const b of player.bullets) {
    drawAxe(b.x, b.y, -Math.PI / 2 + b.spin, 16);
    ctx.globalAlpha = 0.2;
    ctx.fillStyle   = '#00ffe7';
    ctx.beginPath();
    ctx.arc(b.x, b.y + 6, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Bonus drops
  ctx.font = '18px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const b of bonuses) ctx.fillText('❤️', b.x, b.y);

  // Player
  drawPlayer(player.x, player.y, player.invincible > 0);

  // Ligne limite bas
  ctx.strokeStyle = 'rgba(0,255,231,0.12)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([5, 9]);
  ctx.beginPath();
  ctx.moveTo(0, H - 44);
  ctx.lineTo(W, H - 44);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ════════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════════
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.save();
  applyShake();
  drawStars(dt);

  switch (gameState) {

    case 'title':
      drawTitleScreen();
      if (Keys['Space'] || Keys['Enter'] || Pad.pressed(Pad.BTN_A) || Pad.pressed(Pad.BTN_START)) {
        ensureAudio(); resumeAudio(); startGame();
      }
      break;

    case 'playing':
      pollInput(dt);
      update(dt);
      drawGame();
      updateParticles(dt);
      drawFlash();
      break;

    case 'paused':
      drawGame();
      drawPauseScreen();
      if (Pad.pressed(Pad.BTN_A)) gameState = 'playing';
      break;

    case 'levelup':
      pollInput(dt);
      update(dt);
      drawGame();
      updateParticles(dt);
      drawLevelUpScreen();
      break;

    case 'gameover':
      drawGame();
      updateParticles(dt);
      drawFlash();
      drawGameOverScreen();
      if (Keys['Space'] || Keys['Enter'] || Pad.pressed(Pad.BTN_A) || Pad.pressed(Pad.BTN_START)) {
        ensureAudio(); resumeAudio(); startGame();
      }
      break;
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

function startGame() {
  score = 0; lives = 3; wave = 1;
  player.x = W / 2; player.y = H - 62;
  player.bullets = []; player.invincible = 0; player.shootCooldown = 0;
  particles.length = 0; flashAlpha = 0; shakePow = 0;
  spawnWave(wave);
  gameState = 'playing';
  updateHUD();
  ensureAudio();
  startEngine();
}

// Boot
updateHUD();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
